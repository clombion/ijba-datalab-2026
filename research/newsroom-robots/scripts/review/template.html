<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recode Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>/* {{STYLE}} */</style>
</head>
<body>

<!-- Toolbar -->
<header id="toolbar">
  <div class="toolbar-row toolbar-top">
    <a href="../../../../" class="toolbar-home" aria-label="Back to tools">&larr; Tools</a>
    <h1>Recode Review</h1>
    <div class="episode-nav">
      <button id="btn-prev" type="button" aria-label="Previous episode">&larr;</button>
      <span id="episode-counter">1 / 42</span>
      <button id="btn-next" type="button" aria-label="Next episode">&rarr;</button>
    </div>
    <span id="progress">0 / 0 reviewed</span>
    <div class="toolbar-actions">
      <button id="btn-github" type="button" aria-label="GitHub sync"><span id="gh-indicator" class="gh-dot"></span> Connect</button>
      <span id="gh-status-text" class="gh-status-text"></span>
      <button id="btn-theme" type="button" aria-label="Toggle light/dark">Light</button>
      <button id="btn-export" type="button">Export</button>
      <button id="btn-import" type="button">Import</button>
    </div>
    <button id="hamburger" type="button" aria-label="Toggle menu">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none"><path d="M1 1h18M1 7h18M1 13h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="toolbar-row toolbar-bottom" id="toolbar-controls">
    <div class="toolbar-group">
      <label class="toggle"><input type="checkbox" id="hide-reviewed"><span>Hide reviewed</span></label>
    </div>
  </div>
</header>

<!-- Main layout: transcript + side panel -->
<div id="main-layout">
  <!-- Transcript column -->
  <div id="transcript-column">
    <div id="episode-header"></div>
    <div id="transcript-body"></div>
  </div>

  <!-- Side panel (hidden until highlight clicked) -->
  <aside id="side-panel" class="hidden">
    <div class="panel-header">
      <span id="panel-theme-id" class="theme-id"></span>
      <span id="panel-theme-name" class="theme-name"></span>
      <button id="panel-close" type="button" aria-label="Close panel">&times;</button>
    </div>
    <div class="panel-actions">
      <button id="btn-validate" type="button" class="action-btn valid">&#10003; Valid</button>
      <button id="btn-invalidate" type="button" class="action-btn invalid">&#10007; Invalid</button>
    </div>
    <div class="panel-field">
      <label>Relevance</label>
      <div id="panel-relevance" class="relevance-selector">
        <button type="button" data-rel="primary" class="rel-btn rel-primary">primary<span class="shortcut">1</span></button>
        <button type="button" data-rel="secondary" class="rel-btn rel-secondary">secondary<span class="shortcut">2</span></button>
        <button type="button" data-rel="tangential" class="rel-btn rel-tangential">tangential<span class="shortcut">3</span></button>
      </div>
    </div>
    <div class="panel-field">
      <label>Codes <button id="btn-add-code" type="button" class="add-code-btn">+ Add</button></label>
      <div id="panel-codes"></div>
    </div>
    <div class="panel-field">
      <label>Quote</label>
      <blockquote id="panel-quote"></blockquote>
    </div>
    <div class="panel-field">
      <label>Summary</label>
      <div id="panel-summary"></div>
    </div>
    <div id="panel-override-note" class="override-note"></div>
  </aside>
</div>

<!-- Add passage floating button -->
<div id="add-passage-btn" class="hidden">+ Add passage</div>

<!-- Code search modal -->
<div id="code-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Add/Remove codes">
  <div class="modal-content code-modal-content">
    <h2>Add/Remove Codes</h2>
    <input type="search" id="code-search" placeholder="Search codes..." autocomplete="off">
    <div id="code-list"></div>
    <div class="modal-actions">
      <button id="code-modal-done" type="button">Done</button>
    </div>
  </div>
</div>

<!-- Add passage modal -->
<div id="passage-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Add new passage">
  <div class="modal-content passage-modal-content">
    <h2>Add New Passage</h2>
    <div id="passage-selected-text" class="passage-preview"></div>
    <label class="modal-field">
      Theme
      <select id="passage-theme"></select>
    </label>
    <label class="modal-field">
      Relevance
      <select id="passage-relevance">
        <option value="">Select...</option>
        <option value="primary">primary</option>
        <option value="secondary">secondary</option>
        <option value="tangential">tangential</option>
      </select>
    </label>
    <label class="modal-field">
      Codes
      <div id="passage-codes-container">
        <button id="passage-add-code-btn" type="button" class="add-code-btn">+ Add codes</button>
        <div id="passage-codes-list"></div>
      </div>
    </label>
    <label class="modal-field">
      Speaker
      <input type="text" id="passage-speaker" placeholder="Speaker name">
    </label>
    <label class="modal-field">
      Summary
      <textarea id="passage-summary" rows="3" placeholder="Brief summary of this passage's relevance"></textarea>
    </label>
    <div id="passage-modal-status" class="modal-status"></div>
    <div class="modal-actions">
      <button id="passage-cancel" type="button">Cancel</button>
      <button id="passage-save" type="button" disabled>Save</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Import decisions">
  <div class="modal-content">
    <h2>Import Decisions</h2>
    <p>Select a JSON decision file to import.</p>
    <input type="file" id="import-files" accept=".json">
    <div id="import-status"></div>
    <div class="modal-actions">
      <button id="modal-cancel" type="button">Cancel</button>
      <button id="modal-confirm" type="button">Import</button>
    </div>
  </div>
</div>

<!-- GitHub settings modal -->
<div id="gh-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="GitHub connection">
  <div class="modal-content gh-modal-content">
    <h2>Connect to GitHub</h2>
    <p>Enter a fine-grained Personal Access Token with Contents read/write permission for the target repo.</p>
    <label class="gh-field">Token <input id="gh-input-token" type="password" placeholder="github_pat_..." autocomplete="off"></label>
    <label class="gh-field">Owner <input id="gh-input-owner" type="text" value="clombion"></label>
    <label class="gh-field">Repo <input id="gh-input-repo" type="text" value="ijba-datalab-2026"></label>
    <label class="gh-field">Path <input id="gh-input-path" type="text" value="research/newsroom-robots/decisions.json" disabled></label>
    <div id="gh-modal-status" class="gh-modal-status"></div>
    <div class="modal-actions">
      <button id="gh-disconnect-btn" type="button" style="display:none;color:var(--fg-muted)">Disconnect</button>
      <button id="gh-close-btn" type="button">Cancel</button>
      <button id="gh-connect-btn" type="button">Connect</button>
    </div>
  </div>
</div>

<!-- Embedded data -->
<script id="recode-data" type="application/gzip+base64">{{DATA}}</script>

<!-- fflate decompression library (0.8.2) -->
<script>/* {{FFLATE}} */</script>

<!-- Application -->
<script>/* {{SCRIPT}} */</script>

</body>
</html>
