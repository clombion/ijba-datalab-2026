<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapping Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>/* {{STYLE}} */</style>
</head>
<body>

<!-- Toolbar -->
<header id="toolbar">
  <div class="toolbar-row toolbar-top">
    <a href="../../../../../" class="toolbar-home" aria-label="Back to tools">&larr; Tools</a>
    <h1>Mapping Review</h1>
    <span id="progress">0 / 0 reviewed (0 visible)</span>
    <div class="toolbar-actions">
      <button id="btn-github" type="button" aria-label="GitHub sync"><span id="gh-indicator" class="gh-dot"></span> Connect</button>
      <span id="gh-status-text" class="gh-status-text"></span>
      <button id="btn-theme" type="button" aria-label="Toggle light/dark">Light</button>
      <button id="btn-export" type="button">Export</button>
      <button id="btn-import" type="button">Import</button>
    </div>
    <button id="hamburger" type="button" aria-label="Toggle menu">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none"><path d="M1 1h18M1 7h18M1 13h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="toolbar-row toolbar-bottom" id="toolbar-controls">
    <div class="toolbar-group">
      <label class="toggle"><input type="checkbox" id="hide-reviewed"><span>Hide reviewed</span></label>
    </div>
    <div class="toolbar-group">
      <select id="filter-step" aria-label="Filter pipeline step"><option value="">All steps</option></select>
      <select id="filter-status" aria-label="Filter mapping status"><option value="">All statuses</option></select>
      <select id="filter-disruption" aria-label="Filter disruption type"><option value="">All disruptions</option></select>
      <button id="btn-clear" type="button">Clear all</button>
    </div>
  </div>
</header>

<!-- Scroll container -->
<div id="scroll-container">
  <div id="scroll-spacer"></div>
  <div id="visible-rows"></div>
</div>

<!-- Taxonomy tooltip -->
<div id="taxonomy-tooltip" class="hidden"></div>

<!-- Import modal -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Import decisions">
  <div id="modal">
    <h2>Import Decisions</h2>
    <p>Select one or more JSON decision files.</p>
    <input type="file" id="import-files" multiple accept=".json">
    <div id="import-status"></div>
    <div class="modal-actions">
      <button id="modal-cancel" type="button">Cancel</button>
      <button id="modal-confirm" type="button">Import</button>
    </div>
  </div>
</div>

<!-- GitHub settings modal -->
<div id="gh-modal" class="hidden" role="dialog" aria-modal="true" aria-label="GitHub connection">
  <div class="gh-modal-content">
    <h2>Connect to GitHub</h2>
    <p>Enter a fine-grained Personal Access Token with Contents read/write permission.</p>
    <label class="gh-field">Token <input id="gh-input-token" type="password" placeholder="github_pat_..." autocomplete="off"></label>
    <label class="gh-field">Owner <input id="gh-input-owner" type="text" value="clombion"></label>
    <label class="gh-field">Repo <input id="gh-input-repo" type="text" value="ijba-datalab-2026"></label>
    <label class="gh-field">Path <input id="gh-input-path" type="text" value="research/pipeline-canon-2/decisions/mapping.json"></label>
    <div id="gh-modal-status" class="gh-modal-status"></div>
    <div class="modal-actions">
      <button id="gh-disconnect-btn" type="button" style="display:none;color:var(--fg-muted)">Disconnect</button>
      <button id="gh-close-btn" type="button">Cancel</button>
      <button id="gh-connect-btn" type="button">Connect</button>
    </div>
  </div>
</div>

<!-- Pill strip (touch) -->
<div id="pill-strip" class="hidden" role="listbox" aria-label="Quick select"></div>

<!-- Embedded data (mapping + taxonomy) -->
<script id="mapping-data" type="application/gzip+base64">{{DATA}}</script>

<!-- fflate -->
<script>/* {{FFLATE}} */</script>

<!-- Application -->
<script>/* {{SCRIPT}} */</script>

</body>
</html>
